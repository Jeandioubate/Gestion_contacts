<!DOCTYPE html>
<!--
  Page principale de gestion des contacts (contacts.html)
  Cette page affiche la liste des contacts avec des fonctionnalités de :
  - Filtrage par catégorie
  - Recherche textuelle (nom/prénom)
  - Ajout, modification, suppression de contacts
  - Envoi et consultation de messages

  Accessible uniquement après authentification (vérifiée par le contrôleur)
  Utilise le template layout.html comme structure de base
-->

<!--
  Déclarations des namespaces :
  - th: pour les attributs Thymeleaf
  - layout: pour l'extension Layout Dialect
  - layout:decorate="~{layout}" : hérite du template layout.html
-->
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{layout}">

<!-- Zone de contenu principal injectée dans le layout -->
<div layout:fragment="content" class="container mt-4">

	<!-- Carte principale contenant la liste des contacts -->
	<div class="card">

		<!-- En-tête de la carte -->
		<div class="card-header bg-primary text-white">
			<h4>Mes contacts</h4>
		</div>

		<div class="card-body">

			<!-- ===================================================== -->
			<!-- SECTION 1 : FILTRES PAR CATÉGORIE (Boutons)           -->
			<!-- ===================================================== -->
			<div class="mb-3">
				<!-- Groupe de boutons Bootstrap -->
				<div class="btn-group" role="group">

					<!-- Bouton "Tous" : affiche tous les contacts sans filtre -->
					<a th:href="@{/index}"
					   class="btn"
					   th:classappend="${selectedCategoryId == null} ? 'btn-primary' : 'btn-outline-primary'">
						Tous
					</a>

					<!--
					  Boutons de catégorie générés dynamiquement
					  th:each="cat : ${categories}" : itère sur toutes les catégories
					  th:classappend : applique btn-primary si sélectionné, btn-outline-primary sinon
					-->
					<a th:each="cat : ${categories}"
					   th:href="@{/index(categoryId=${cat.id})}"
					   class="btn"
					   th:classappend="${selectedCategoryId == cat.id} ? 'btn-primary' : 'btn-outline-primary'"
					   th:text="${cat.name}">
					</a>
				</div>
			</div>

			<!-- ===================================================== -->
			<!-- SECTION 2 : BARRE DE RECHERCHE TEXTUELLE              -->
			<!-- ===================================================== -->
			<!--
			  Formulaire de recherche en méthode GET
			  L'action pointe vers /index pour conserver le contexte
			-->
			<form th:action="@{/index}" method="get" class="mb-3">
				<div class="input-group">
					<!-- Champ caché pour conserver le filtre de catégorie lors de la recherche -->
					<input type="hidden" name="categoryId" th:value="${selectedCategoryId}">

					<!-- Champ de saisie du mot-clé -->
					<input type="text" name="keyword" class="form-control"
						   th:value="${keyword}" placeholder="Rechercher par nom ou prénom...">

					<!-- Bouton de recherche -->
					<button type="submit" class="btn btn-primary">Rechercher</button>

					<!-- Bouton de réinitialisation : efface la recherche mais conserve la catégorie -->
					<a th:href="@{/index(categoryId=${selectedCategoryId})}" class="btn btn-secondary">Réinitialiser</a>
				</div>
			</form>
			
				<!-- ===================================================== -->
			<!-- SECTION 3 : BOUTON D'AJOUT DE CONTACT                 -->
			<!-- ===================================================== -->
			<div class="mb-3">
				<a th:href="@{/contact}" class="btn btn-success">
					+ Nouveau contact
				</a>
			</div>

			<!-- ===================================================== -->
			<!-- SECTION 4 : TABLEAU DES CONTACTS                      -->
			<!-- ===================================================== -->
			<table class="table table-striped table-bordered">
				<!-- En-tête du tableau avec fond sombre -->
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Nom</th>
						<th>Prénom</th>
						<th>Email</th>
						<th>Téléphone</th>
						<th>Adresse</th>
						<th>Catégorie</th>
						<th>Messages</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody>
					<!--
					  Itération sur la liste des contacts (filtrée par catégorie et mot-clé)
					  th:each="contact : ${listContact}"
					-->
					<tr th:each="contact : ${listContact}">
						<!-- Affichage des propriétés du contact -->
						<td th:text="${contact.id}"></td>
						<td th:text="${contact.lastName}"></td>
						<td th:text="${contact.firstName}"></td>
						<td th:text="${contact.email}"></td>
						<td th:text="${contact.phoneNumber}"></td>
						<td th:text="${contact.address}"></td>

						<!-- Colonne Catégorie avec badge coloré -->
						<td>
							<!-- Si le contact a une catégorie -->
							<span th:if="${contact.category != null}"
								  class="badge"
								  th:classappend="${contact.category.name == 'Professionnel'} ? 'bg-info' : 'bg-success'"
								  th:text="${contact.category.name}">
							</span>
							<!-- Si le contact n'a pas de catégorie -->
							<span th:if="${contact.category == null}" class="badge bg-secondary">Non classé</span>
						</td>

						<!-- Colonne Messages : boutons Envoyer et Voir -->
						<td>
							<!-- Bouton Envoyer un message -->
							<a th:href="@{/sendMessage(contactId=${contact.id}, categoryId=${selectedCategoryId}, keyword=${keyword})}"
							   class="btn btn-info btn-sm w-100"> Envoyer</a>
							<!-- Bouton Voir les messages -->
							<a th:href="@{/viewMessages(contactId=${contact.id}, categoryId=${selectedCategoryId}, keyword=${keyword})}"
							   class="btn btn-secondary btn-sm w-100 mt-1"> Voir</a>
							</td>

						<!-- Colonne Actions : boutons Modifier et Supprimer -->
						<td>
							<!-- Bouton Modifier (redirige vers formulaire d'édition) -->
							<a th:href="@{/edit(id=${contact.id}, categoryId=${selectedCategoryId}, keyword=${keyword})}"
							   class="btn btn-warning btn-sm w-100">Modifier</a>

							<!-- Bouton Supprimer avec confirmation JavaScript -->
							<a th:href="@{/delete(id=${contact.id}, categoryId=${selectedCategoryId}, keyword=${keyword})}"
							   class="btn btn-danger btn-sm w-100 mt-1"
							   onclick="return confirm('Supprimer ce contact ?');">Supprimer</a>
							</td>
						</tr>

					<!-- Message affiché si la liste des contacts est vide -->
					<tr th:if="${listContact.isEmpty()}">
						<td colspan="9" class="text-center">Aucun contact trouvé</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</div>
</html>
